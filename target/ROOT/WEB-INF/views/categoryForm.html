<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>

    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }

        .back-btn {
            display: inline-block; padding: 8px 16px;
            background: #6c757d; color: white;
            text-decoration: none; border-radius: 4px;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 20px; }

        input {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }

        input:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 5px;
            display: block;
        }

        .btn-submit {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #357abd;
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;

            background: #f8f9fa;
            text-align: center;
            padding: 10px 0;
            border-top: 1px solid #dee2e6;
        }

        body {
            padding-bottom: 60px;
        }
    </style>
</head>
<body>

<h1>카테고리 등록</h1>

<a class="back-btn" th:href="@{/categories}">← 목록으로</a>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">

    <div class="form-group">
        <input type="text" th:field="*{name}" placeholder="카테고리 이름 입력"/>
        <span class="error-msg" th:errors="*{name}"></span>
    </div>

    <button type="submit" class="btn-submit">등록</button>
</form>

<div th:replace="common/footer :: footer"></div>

</body>
</html>
